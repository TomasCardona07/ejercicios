<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="images/descarga.png" type="image/png">
</head>
<body>
    <h1>CALCULADORA WEB</h1>
    <div class="contenedor-calculadora">
        
        <div class="cajaInput">    
            <input class="input" type="number" id="num1" placeholder="ingrese el Primer número" required>
            <br><br>
            <input class="input" type="number" id="num2" placeholder="ingrese el Segundo número" required>
        </div>
        <div class="botones">
            <button class="botonSuma" onclick="resultSuma()" id="suma">SUMAR</button>
            <button class="botonResta" onclick="resultResta()" id="resta">RESTAR</button>
            <button class="botonMulti" onclick="resultMulti()" id="multiplicacion">MULTIPLICAR</button>
            <button class="botonDiv" onclick="resultDiv()" id="division">DIVIDIR</button>

        </div>
    <h3 id="resultado"></h3>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
